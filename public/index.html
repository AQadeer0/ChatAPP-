<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SleekChat - Realtime WebSockets Chat</title>

    <!-- Google Fonts for premium typography -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

/* --- SLEEKCHAT PREMIUM STYLESHEET --- */



:root {

    /* Color Palette */

    --bg-dark: #0a0b10;

    --card-bg: rgba(22, 25, 38, 0.45);

    --border-color: rgba(255, 255, 255, 0.07);

    --border-hover: rgba(255, 255, 255, 0.15);

    

    /* Accents */

    --accent-purple: #9d4edd;

    --accent-magenta: #e040fb;

    --accent-cyan: #00e5ff;

    --gradient-accent: linear-gradient(135deg, #7b2cbf, #e040fb);

    --gradient-user-bubble: linear-gradient(135deg, #5a189a, #7b2cbf);

    --other-bubble-bg: rgba(255, 255, 255, 0.05);



    /* Text */

    --text-primary: #f8f9fa;

    --text-secondary: #adb5bd;

    --text-muted: #6c757d;



    /* Fonts & Radii */

    --font-heading: 'Outfit', sans-serif;

    --font-body: 'Plus Jakarta Sans', sans-serif;

    --radius-lg: 16px;

    --radius-md: 12px;

    --radius-sm: 8px;

    

    /* Box Shadow */

    --shadow-main: 0 8px 32px 0 rgba(0, 0, 0, 0.4);

}



/* Reset & Global */

* {

    margin: 0;

    padding: 0;

    box-sizing: border-box;

}



body {

    font-family: var(--font-body);

    background-color: var(--bg-dark);

    color: var(--text-primary);

    min-height: 100vh;

    overflow: hidden;

    display: flex;

    justify-content: center;

    align-items: center;

    position: relative;

}



/* Background Glowing Orbs */

.glow-container {

    position: absolute;

    top: 0;

    left: 0;

    width: 100%;

    height: 100%;

    overflow: hidden;

    z-index: 1;

    pointer-events: none;

}



.glow-orb {

    position: absolute;

    border-radius: 50%;

    filter: blur(120px);

    opacity: 0.15;

    animation: moveOrb 20s infinite alternate ease-in-out;

}



.orb-1 {

    width: 40vw;

    height: 40vw;

    background: var(--gradient-accent);

    top: -10%;

    left: 10%;

}



.orb-2 {

    width: 35vw;

    height: 35vw;

    background: linear-gradient(135deg, var(--accent-cyan), #3f51b5);

    bottom: -10%;

    right: 15%;

    animation-delay: -5s;

}



@keyframes moveOrb {

    0% {

        transform: translate(0, 0) scale(1);

    }

    100% {

        transform: translate(80px, 50px) scale(1.2);

    }

}



/* App Wrapper */

.app-container {

    position: relative;

    z-index: 2;

    width: 100%;

    max-width: 1000px;

    height: 90vh;

    max-height: 700px;

    padding: 15px;

    display: flex;

    justify-content: center;

    align-items: center;

}



/* Glassmorphism Card Style */

.glass {

    background: var(--card-bg);

    backdrop-filter: blur(16px);

    -webkit-backdrop-filter: blur(16px);

    border: 1px solid var(--border-color);

    border-radius: var(--radius-lg);

    box-shadow: var(--shadow-main);

    transition: border-color 0.3s ease;

}



.glass:hover {

    border-color: var(--border-hover);

}



/* --- LOGIN SCREEN CARD --- */

#login-card {

    width: 100%;

    max-width: 400px;

    padding: 40px 30px;

    text-align: center;

    animation: fadeIn 0.5s ease-out;

}



.logo-icon {

    font-size: 3rem;

    margin-bottom: 10px;

    display: inline-block;

    filter: drop-shadow(0 0 10px var(--accent-magenta));

}



#login-card h1 {

    font-family: var(--font-heading);

    font-size: 1.8rem;

    font-weight: 700;

    margin-bottom: 10px;

    background: linear-gradient(to right, #fff, var(--text-secondary));

    -webkit-background-clip: text;

    background-clip: text;

    -webkit-text-fill-color: transparent;

}



#login-card p {

    color: var(--text-secondary);

    font-size: 0.9rem;

    line-height: 1.5;

    margin-bottom: 30px;

}



.input-group {

    text-align: left;

    margin-bottom: 20px;

}



.input-group label {

    display: block;

    font-size: 0.8rem;

    font-weight: 600;

    text-transform: uppercase;

    color: var(--text-muted);

    margin-bottom: 8px;

    letter-spacing: 0.5px;

}



#username {

    width: 100%;

    padding: 14px 18px;

    border-radius: var(--radius-md);

    background: rgba(0, 0, 0, 0.2);

    border: 1px solid var(--border-color);

    color: var(--text-primary);

    font-family: inherit;

    font-size: 1rem;

    outline: none;

    transition: all 0.3s ease;

}



#username:focus {

    border-color: var(--accent-purple);

    box-shadow: 0 0 0 3px rgba(157, 77, 221, 0.25);

    background: rgba(0, 0, 0, 0.4);

}



.btn-primary {

    width: 100%;

    padding: 14px;

    border-radius: var(--radius-md);

    border: none;

    background: var(--gradient-accent);

    color: white;

    font-family: var(--font-heading);

    font-size: 1rem;

    font-weight: 600;

    cursor: pointer;

    transition: all 0.3s ease;

    display: flex;

    justify-content: center;

    align-items: center;

    gap: 8px;

}



.btn-primary:hover {

    transform: translateY(-2px);

    box-shadow: 0 5px 15px rgba(224, 64, 251, 0.4);

}



.btn-primary:active {

    transform: translateY(0);

}



.card-footer {

    margin-top: 30px;

    font-size: 0.75rem;

    color: var(--text-muted);

}



/* --- CHAT WRAPPER PANEL --- */

.chat-wrapper {

    width: 100%;

    height: 100%;

    display: grid;

    grid-template-columns: 240px 1fr;

    overflow: hidden;

    animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);

}



/* Sidebar Styling */

.chat-sidebar {

    background: rgba(10, 11, 16, 0.4);

    border-right: 1px solid var(--border-color);

    display: flex;

    flex-direction: column;

    height: 100%;

}



.sidebar-header {

    padding: 24px;

    border-bottom: 1px solid var(--border-color);

}



.logo-text {

    font-family: var(--font-heading);

    font-size: 1.25rem;

    font-weight: 700;

    color: white;

}



.channels-section {

    padding: 24px;

    flex-grow: 1;

}



.channels-section h3 {

    font-size: 0.75rem;

    font-weight: 700;

    text-transform: uppercase;

    color: var(--text-muted);

    letter-spacing: 1px;

    margin-bottom: 15px;

}



.channel-item {

    display: flex;

    align-items: center;

    gap: 8px;

    padding: 10px 12px;

    border-radius: var(--radius-sm);

    color: var(--text-secondary);

    font-size: 0.95rem;

    cursor: pointer;

    transition: all 0.2s ease;

}



.channel-item.active, .channel-item:hover {

    background: rgba(255, 255, 255, 0.05);

    color: white;

}



.hashtag {

    color: var(--accent-cyan);

    font-weight: 700;

}



.user-info {

    padding: 16px 20px;

    border-top: 1px solid var(--border-color);

    background: rgba(0, 0, 0, 0.15);

    display: flex;

    align-items: center;

    gap: 12px;

}



.avatar {

    width: 36px;

    height: 36px;

    border-radius: 50%;

    background: var(--gradient-accent);

    color: white;

    font-weight: 700;

    display: flex;

    justify-content: center;

    align-items: center;

    font-size: 0.9rem;

    text-transform: uppercase;

}



.user-details {

    display: flex;

    flex-direction: column;

}



.user-name {

    font-size: 0.9rem;

    font-weight: 600;

    color: white;

}



.user-status {

    font-size: 0.75rem;

    color: var(--accent-cyan);

}



/* Chat Main Layout */

.chat-main {

    display: flex;

    flex-direction: column;

    height: 100%;

    min-height: 0;

    overflow: hidden;

}



.chat-header {

    padding: 16px 24px;

    border-bottom: 1px solid var(--border-color);

    display: flex;

    justify-content: space-between;

    align-items: center;

}



.header-info h2 {

    font-family: var(--font-heading);

    font-size: 1.15rem;

    font-weight: 600;

}



.header-info p {

    font-size: 0.75rem;

    color: var(--text-muted);

    margin-top: 2px;

}



.db-status-badge {

    display: flex;

    align-items: center;

    gap: 8px;

    font-size: 0.8rem;

    color: var(--text-secondary);

    padding: 6px 12px;

    border-radius: 20px;

    background: rgba(255, 255, 255, 0.05);

    border: 1px solid var(--border-color);

}



.status-dot {

    width: 8px;

    height: 8px;

    border-radius: 50%;

    background-color: #4caf50;

    box-shadow: 0 0 8px #4caf50;

}



/* Messages Area */

.messages-feed {

    flex-grow: 1;

    padding: 24px;

    overflow-y: auto;

    display: flex;

    flex-direction: column;

    gap: 16px;

}



/* Custom Scrollbar for messages */

.messages-feed::-webkit-scrollbar {

    width: 6px;

}



.messages-feed::-webkit-scrollbar-track {

    background: transparent;

}



.messages-feed::-webkit-scrollbar-thumb {

    background: rgba(255, 255, 255, 0.1);

    border-radius: 3px;

}



.messages-feed::-webkit-scrollbar-thumb:hover {

    background: rgba(255, 255, 255, 0.2);

}



/* Message Bubbles layout */

.message-row {

    display: flex;

    flex-direction: column;

    max-width: 75%;

}



.message-row.user {

    align-self: flex-end;

    align-items: flex-end;

}



.message-row.other {

    align-self: flex-start;

    align-items: flex-start;

}



.message-meta {

    font-size: 0.75rem;

    color: var(--text-muted);

    margin-bottom: 4px;

    padding: 0 4px;

}



.message-meta .sender-name {

    font-weight: 600;

    color: var(--text-secondary);

    margin-right: 6px;

}



.message-bubble {

    padding: 12px 16px;

    border-radius: var(--radius-md);

    font-size: 0.95rem;

    line-height: 1.45;

    word-break: break-word;

    box-shadow: 0 2px 5px rgba(0,0,0,0.1);

}



.message-row.user .message-bubble {

    background: var(--gradient-user-bubble);

    color: white;

    border-bottom-right-radius: 2px;

}



.message-row.other .message-bubble {

    background: var(--other-bubble-bg);

    color: var(--text-primary);

    border-bottom-left-radius: 2px;

    border: 1px solid var(--border-color);

}



/* System notifications */

.system-notification {

    align-self: center;

    font-size: 0.75rem;

    color: var(--text-muted);

    background: rgba(255, 255, 255, 0.04);

    padding: 5px 12px;

    border-radius: 20px;

    border: 1px solid rgba(255, 255, 255, 0.03);

    margin: 8px 0;

    animation: fadeIn 0.3s ease-out;

}



/* Input Area */

.chat-input-area {

    padding: 16px 24px;

    border-top: 1px solid var(--border-color);

}



#chat-form {

    display: flex;

    gap: 12px;

}



#message-input {

    flex-grow: 1;

    padding: 14px 18px;

    border-radius: var(--radius-md);

    background: rgba(0, 0, 0, 0.2);

    border: 1px solid var(--border-color);

    color: var(--text-primary);

    font-family: inherit;

    font-size: 0.95rem;

    outline: none;

    transition: all 0.3s ease;

}



#message-input:focus {

    border-color: var(--accent-purple);

    background: rgba(0, 0, 0, 0.3);

}



.btn-send {

    width: 48px;

    height: 48px;

    border-radius: var(--radius-md);

    border: none;

    background: var(--gradient-accent);

    color: white;

    cursor: pointer;

    display: flex;

    justify-content: center;

    align-items: center;

    transition: all 0.3s ease;

}



.btn-send:hover {

    transform: translateY(-2px);

    box-shadow: 0 4px 12px rgba(224, 64, 251, 0.3);

}



/* Helper utilities */

.hidden {

    display: none !important;

}



/* Keyframes */

@keyframes fadeIn {

    from {

        opacity: 0;

        transform: translateY(10px);

    }

    to {

        opacity: 1;

        transform: translateY(0);

    }

}



@keyframes scaleIn {

    from {

        opacity: 0;

        transform: scale(0.96);

    }

    to {

        opacity: 1;

        transform: scale(1);

    }

}



/* Responsive adjustment for phones */

@media (max-width: 650px) {

    .chat-wrapper {

        grid-template-columns: 1fr;

    }

    .chat-sidebar {

        display: none;

    }

}



/* --- OFFLINE FALLBACK MODE STYLES --- */



/* Offline / Local Status Badge Theme */

.db-status-badge.offline {

    color: #ffb74d;

    background: rgba(255, 183, 77, 0.05);

    border-color: rgba(255, 183, 77, 0.15);

}



.db-status-badge.offline .status-dot {

    background-color: #ff9800;

    box-shadow: 0 0 8px #ff9800;

    animation: pulse-orange 2s infinite ease-in-out;

}



@keyframes pulse-orange {

    0% {

        box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7);

    }

    70% {

        box-shadow: 0 0 0 8px rgba(255, 152, 0, 0);

    }

    100% {

        box-shadow: 0 0 0 0 rgba(255, 152, 0, 0);

    }

}



/* Offline Actions Section in Sidebar */

.offline-actions-section {

    margin-top: 30px;

    padding-top: 15px;

    border-top: 1px solid var(--border-color);

    animation: fadeIn 0.4s ease-out;

}



.btn-clear-cache {

    width: 100%;

    margin-top: 8px;

    padding: 10px;

    border-radius: var(--radius-sm);

    border: 1px solid rgba(244, 67, 54, 0.3);

    background: rgba(244, 67, 54, 0.08);

    color: #ef5350;

    font-family: var(--font-heading);

    font-size: 0.8rem;

    font-weight: 600;

    cursor: pointer;

    transition: all 0.2s ease;

    display: flex;

    justify-content: center;

    align-items: center;

}



.btn-clear-cache:hover {

    background: rgba(244, 67, 54, 0.18);

    border-color: rgba(244, 67, 54, 0.5);

    transform: translateY(-1px);

}



.btn-clear-cache:active {

    transform: translateY(0);

}



/* Message Offline Indicator Badge */

.msg-offline-badge {

    font-size: 0.65rem;

    color: #ffb74d;

    background: rgba(255, 183, 77, 0.1);

    padding: 1px 5px;

    border-radius: 4px;

    margin-left: 6px;

    border: 1px solid rgba(255, 183, 77, 0.2);

    display: inline-block;

    vertical-align: middle;

}

/* --- IMAGE SHARING PREMIUM STYLES --- */
.btn-attach {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
}

.btn-attach:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border-color: var(--border-hover);
    transform: translateY(-2px);
}

.btn-attach.has-file {
    background: rgba(0, 229, 255, 0.1);
    color: var(--accent-cyan);
    border-color: rgba(0, 229, 255, 0.4);
}

.image-preview-container {
    padding: 10px;
    margin-bottom: 12px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    animation: fadeIn 0.3s ease-out;
}

.preview-wrapper {
    position: relative;
    display: inline-block;
}

#image-preview {
    max-height: 80px;
    max-width: 120px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: block;
}

.btn-cancel-preview {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ef5350;
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 14px;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    transition: transform 0.2s ease;
}

.btn-cancel-preview:hover {
    transform: scale(1.1);
    background: #f44336;
}

.message-image {
    max-width: 100%;
    max-height: 280px;
    border-radius: var(--radius-sm);
    margin-top: 8px;
    display: block;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.message-image:hover {
    transform: scale(1.01);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.drag-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 11, 16, 0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: var(--radius-lg);
    border: 2px dashed var(--accent-cyan);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.chat-main.drag-over {
    position: relative;
}

.chat-main.drag-over .drag-overlay {
    opacity: 1;
    pointer-events: auto;
}

.drag-overlay-content {
    text-align: center;
    color: white;
}

.drag-overlay-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
}

    </style>

</head>

<body>

    <!-- Animated background glowing orbs -->

    <div class="glow-container">

        <div class="glow-orb orb-1"></div>

        <div class="glow-orb orb-2"></div>

    </div>



    <div class="app-container">

        <!-- 1. LOGIN / USERNAME SCREEN -->

        <div id="login-card" class="card glass">

            <div class="card-header">

                <div class="logo-icon">⚡</div>

                <h1>Welcome to SleekChat</h1>

                <p>Enter a username to join the real-time chat space.</p>

            </div>

            

            <form id="login-form">

                <div class="input-group">

                    <label for="username">Choose a Username</label>

                    <input type="text" id="username" placeholder="e.g. hussaini" required autocomplete="off" maxlength="15">

                </div>

                <button type="submit" class="btn-primary">

                    Join Chat <span>🚀</span>

                </button>

            </form>

            <div class="card-footer">

                <p>Powered by Python WebSockets & PostgreSQL</p>

            </div>

        </div>



        <!-- 2. MAIN CHAT AREA (Hidden by default) -->

        <div id="chat-card" class="chat-wrapper glass hidden">

            <!-- Sidebar -->

            <aside class="chat-sidebar">

                <div class="sidebar-header">

                    <div class="logo-text">⚡ SleekChat</div>

                </div>

                <div class="channels-section">

                    <h3>Channels</h3>

                    <div class="channel-item active">

                        <span class="hashtag">#</span> global-lounge

                    </div>

                    

                    <div class="offline-actions-section hidden" id="offline-actions-section">

                        <h3>Local Cache</h3>

                        <button id="clear-cache-btn" class="btn-clear-cache">

                            Clear Offline Chat

                        </button>

                    </div>

                </div>

                <div class="user-info">

                    <div class="avatar" id="user-avatar">?</div>

                    <div class="user-details">

                        <span class="user-name" id="current-username">Guest</span>

                        <span class="user-status">Online</span>

                    </div>

                </div>

            </aside>



            <!-- Main Chat Panel -->

            <main class="chat-main" id="chat-main">

                <!-- Drag & Drop Overlay -->
                <div class="drag-overlay" id="drag-overlay">
                    <div class="drag-overlay-content">
                        <div class="drag-overlay-icon">📁</div>
                        <h3>Drop image here to upload</h3>
                    </div>
                </div>

                <!-- Chat Header -->

                <header class="chat-header">

                    <div class="header-info">

                        <h2># global-lounge</h2>

                        <p>Real-time room backed by PostgreSQL</p>

                    </div>

                    <div class="db-status-badge">

                        <span class="status-dot"></span>

                        Postgres Active

                    </div>

                </header>



                <!-- Messages Feed -->

                <div class="messages-feed" id="messages-feed">

                    <!-- Sample messages will load dynamically -->

                </div>



                <!-- Chat Input Bar -->

                <footer class="chat-input-area">

                    <!-- Image Preview Container -->
                    <div id="image-preview-container" class="image-preview-container hidden">
                        <div class="preview-wrapper">
                            <img id="image-preview" src="" alt="Selected image preview">
                            <button type="button" id="btn-cancel-preview" class="btn-cancel-preview" title="Remove image">&times;</button>
                        </div>
                    </div>

                    <form id="chat-form">

                        <!-- Hidden File Input -->
                        <input type="file" id="image-upload-input" accept="image/*" class="hidden">
                        
                        <!-- Attachment Button -->
                        <button type="button" id="btn-attach" class="btn-attach" title="Attach Image">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </button>

                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">

                        <button type="submit" class="btn-send">

                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

                        </button>

                    </form>

                </footer>

            </main>

        </div>

    </div>



    <script>

// Variables to hold state

let socket = null;

let currentUsername = "";

let isOfflineMode = false;

let reconnectTimer = null;



const LOCAL_STORAGE_KEY = "sleekchat_offline_history";



// DOM Elements

const loginCard = document.getElementById("login-card");

const chatCard = document.getElementById("chat-card");

const loginForm = document.getElementById("login-form");

const usernameInput = document.getElementById("username");

const chatForm = document.getElementById("chat-form");

const messageInput = document.getElementById("message-input");

const messagesFeed = document.getElementById("messages-feed");



const currentUsernameLabel = document.getElementById("current-username");

const userAvatar = document.getElementById("user-avatar");

const statusText = document.querySelector(".db-status-badge");

const offlineActionsSection = document.getElementById("offline-actions-section");

const clearCacheBtn = document.getElementById("clear-cache-btn");

let selectedImageBase64 = ""; // Holds the compressed base64 representation of the current image

// Additional DOM Elements for image attachment
const imageUploadInput = document.getElementById("image-upload-input");
const btnAttach = document.getElementById("btn-attach");
const imagePreviewContainer = document.getElementById("image-preview-container");
const imagePreview = document.getElementById("image-preview");
const btnCancelPreview = document.getElementById("btn-cancel-preview");
const chatMain = document.getElementById("chat-main");



// Bind Clear Cache Button event

clearCacheBtn.addEventListener("click", clearLocalHistory);

// --- IMAGE SHARING HELPERS & EVENT LISTENERS ---

// Process file: read, compress/resize, and update preview
function handleImageFile(file) {
    if (!file || !file.type.startsWith("image/")) {
        console.warn("Selected file is not an image.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // Resize using canvas to prevent sending massive images
            const canvas = document.createElement("canvas");
            const MAX_WIDTH = 1000;
            const MAX_HEIGHT = 1000;
            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            // Compress to JPEG with 0.7 quality
            selectedImageBase64 = canvas.toDataURL("image/jpeg", 0.7);
            
            // Show preview
            imagePreview.src = selectedImageBase64;
            imagePreviewContainer.classList.remove("hidden");
            btnAttach.classList.add("has-file");
            scrollToBottom();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// Clear selected image preview
function clearImagePreview() {
    selectedImageBase64 = "";
    imagePreview.src = "";
    imagePreviewContainer.classList.add("hidden");
    btnAttach.classList.remove("has-file");
    imageUploadInput.value = "";
}

// Bind click to open file dialog
btnAttach.addEventListener("click", () => {
    imageUploadInput.click();
});

// Bind file input change
imageUploadInput.addEventListener("change", (e) => {
    if (e.target.files.length > 0) {
        handleImageFile(e.target.files[0]);
    }
});

// Bind cancel button
btnCancelPreview.addEventListener("click", clearImagePreview);

// Clipboard Paste support
document.addEventListener("paste", (e) => {
    if (!currentUsername) return;
    
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
            const file = items[i].getAsFile();
            handleImageFile(file);
            e.preventDefault();
            break;
        }
    }
});

// Drag and Drop support
document.addEventListener("dragover", (e) => {
    if (!currentUsername) return;
    e.preventDefault();
    chatMain.classList.add("drag-over");
});

document.addEventListener("dragleave", (e) => {
    if (e.relatedTarget === null || !chatMain.contains(e.relatedTarget)) {
        chatMain.classList.remove("drag-over");
    }
});

document.addEventListener("drop", (e) => {
    if (!currentUsername) return;
    e.preventDefault();
    chatMain.classList.remove("drag-over");
    
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith("image/")) {
        handleImageFile(files[0]);
    }
});




// Handle Username/Login submission

loginForm.addEventListener("submit", function(event) {

    event.preventDefault();

    

    const username = usernameInput.value.trim();

    if (!username) return;



    currentUsername = username;

    

    // Set user info on UI

    currentUsernameLabel.textContent = username;

    userAvatar.textContent = username.charAt(0);

    

    // Switch panels (hide login, show chat)

    loginCard.classList.add("hidden");

    chatCard.classList.remove("hidden");

    

    // Update local cache button visibility and load local history immediately

    updateClearCacheButtonVisibility();

    loadOfflineHistory();

    

    // Connect to WebSockets

    connectWebSocket(username);

});



// Setup WebSocket Connection

function connectWebSocket(username) {

    // Generate dynamic WebSocket URL based on current host (e.g. localhost:8000)

    let host = window.location.host;

    if (!host || window.location.protocol === "file:") {

        host = "localhost:8000";

    }

    const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";

    const wsUrl = `${protocol}//${host}/ws/${encodeURIComponent(username)}`;

    

    console.log(`Connecting to WebSocket at: ${wsUrl}`);

    

    if (socket) {

        try {

            socket.close();

        } catch (e) {}

    }



    socket = new WebSocket(wsUrl);



    // Connection opened

    socket.addEventListener("open", function(event) {

        console.log("Connected to SleekChat WebSocket Server");

        isOfflineMode = false;

        updateConnectionStatus(true);

        if (reconnectTimer) {

            clearTimeout(reconnectTimer);

            reconnectTimer = null;

        }

    });



    // Listen for messages from server

    socket.addEventListener("message", function(event) {

        try {

            const data = JSON.parse(event.data);

            

            if (data.type === "history") {

                // Clear the message container

                messagesFeed.innerHTML = "";

                // Render previous messages from database

                data.messages.forEach(msg => {

                    appendMessageBubble(msg.sender, msg.content, msg.time, false);

                });

                scrollToBottom();

            } 

            else if (data.type === "chat") {

                // Render a live chat message

                appendMessageBubble(data.sender, data.content, data.time, false);

                scrollToBottom();

            } 

            else if (data.type === "system") {

                // Render a server system notification

                appendSystemNotification(data.content);

                scrollToBottom();

            }

        } catch (error) {

            console.error("Error parsing socket message:", error);

        }

    });



    // Connection closed

    socket.addEventListener("close", function(event) {

        console.log("Disconnected from SleekChat WebSocket Server");

        if (!isOfflineMode) {

            isOfflineMode = true;

            updateConnectionStatus(false);

            loadOfflineHistory();

        }

        triggerAutoReconnect(username);

    });



    // Connection error

    socket.addEventListener("error", function(event) {

        console.error("WebSocket connection error:", event);

        if (!isOfflineMode) {

            isOfflineMode = true;

            updateConnectionStatus(false);

            loadOfflineHistory();

        }

    });

}



function triggerAutoReconnect(username) {

    if (reconnectTimer) return;

    

    console.log("Scheduling reconnection in 5 seconds...");

    reconnectTimer = setTimeout(function() {

        reconnectTimer = null;

        if (isOfflineMode) {

            console.log("Attempting to reconnect...");

            connectWebSocket(username);

        }

    }, 5000);

}



// Handle sending message

chatForm.addEventListener("submit", function(event) {

    event.preventDefault();

    

    const text = messageInput.value.trim();

    const imageToSend = selectedImageBase64;

    

    if (!text && !imageToSend) return;



    if (!isOfflineMode && socket && socket.readyState === WebSocket.OPEN) {

        // Send text message if any

        if (text) {

            socket.send(JSON.stringify({

                content: text

            }));

        }

        // Send image message if any

        if (imageToSend) {

            socket.send(JSON.stringify({

                content: imageToSend

            }));

        }

    } else {

        // Offline Mode: save to localStorage and append directly

        const time = getCurrentTime();

        if (text) {

            saveLocalMessage(currentUsername, text, time);

            appendMessageBubble(currentUsername, text, time, true);

        }

        if (imageToSend) {

            saveLocalMessage(currentUsername, imageToSend, time);

            appendMessageBubble(currentUsername, imageToSend, time, true);

        }

        scrollToBottom();

    }



    // Reset input and clear preview

    messageInput.value = "";

    clearImagePreview();

    messageInput.focus();

});



// Helper: Append standard message bubble to feed

function appendMessageBubble(sender, content, time, isOffline = false) {

    const isCurrentUser = (sender.toLowerCase() === currentUsername.toLowerCase());

    

    const messageRow = document.createElement("div");

    messageRow.className = `message-row ${isCurrentUser ? 'user' : 'other'}`;

    

    // Message metadata (sender name & time)

    const meta = document.createElement("div");

    meta.className = "message-meta";

    

    const offlineTag = isOffline ? `<span class="msg-offline-badge">Offline</span>` : '';

    

    if (isCurrentUser) {

        meta.innerHTML = `<span class="message-time">${time}</span>${offlineTag}`;

    } else {

        meta.innerHTML = `<span class="sender-name">${sender}</span><span class="message-time">${time}</span>${offlineTag}`;

    }

    

    // Bubble content

    const bubble = document.createElement("div");

    bubble.className = "message-bubble";

    

    const isImage = (content.startsWith("data:image/") || 

                     /^(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp|svg))(?:\?.*)?$/i.test(content));

    

    if (isImage) {

        const imgEl = document.createElement("img");

        imgEl.className = "message-image";

        imgEl.src = content;

        imgEl.alt = "Shared image";

        imgEl.addEventListener("click", () => {

            if (content.startsWith("data:")) {

                const w = window.open();

                w.document.write(`<img src="${content}" style="max-width:100%; max-height:100%; object-fit:contain; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">`);

                w.document.title = "View Image";

                w.document.body.style.backgroundColor = "#0a0b10";

                w.document.body.style.margin = "0";

            } else {

                window.open(content, "_blank");

            }

        });

        bubble.appendChild(imgEl);

    } else {

        bubble.textContent = content; // Using textContent to prevent HTML/XSS injection

    }

    

    messageRow.appendChild(meta);

    messageRow.appendChild(bubble);

    

    messagesFeed.appendChild(messageRow);

}



// Helper: Append grey system notification banner

function appendSystemNotification(text) {

    const notification = document.createElement("div");

    notification.className = "system-notification";

    notification.textContent = text;

    messagesFeed.appendChild(notification);

}



// Helper: Automatically scroll chat area to bottom

function scrollToBottom() {

    messagesFeed.scrollTop = messagesFeed.scrollHeight;

}



// Helper: Update Connection Status Dot

function updateConnectionStatus(isConnected) {

    if (isConnected) {

        statusText.classList.remove("offline");

        statusText.innerHTML = `<span class="status-dot"></span>Postgres Active`;

    } else {

        statusText.classList.add("offline");

        statusText.innerHTML = `<span class="status-dot"></span>Offline (Local)`;

    }

}



// Helper: Get Current Local Time

function getCurrentTime() {

    const now = new Date();

    const hours = String(now.getHours()).padStart(2, '0');

    const minutes = String(now.getMinutes()).padStart(2, '0');

    return `${hours}:${minutes}`;

}



// Local Storage Handlers

function getLocalHistory() {

    try {

        const history = localStorage.getItem(LOCAL_STORAGE_KEY);

        return history ? JSON.parse(history) : [];

    } catch (e) {

        console.error("Error reading localStorage:", e);

        return [];

    }

}



function saveLocalMessage(sender, content, time) {

    try {

        const history = getLocalHistory();

        history.push({ sender, content, time, isOffline: true });

        if (history.length > 100) history.shift();

        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));

        updateClearCacheButtonVisibility();

    } catch (e) {

        console.error("Error writing to localStorage:", e);

    }

}



function clearLocalHistory() {

    try {

        localStorage.removeItem(LOCAL_STORAGE_KEY);

        updateClearCacheButtonVisibility();

        if (isOfflineMode) {

            messagesFeed.innerHTML = "";

            appendSystemNotification("Local history cleared.");

        } else {

            appendSystemNotification("Offline local history cleared.");

        }

    } catch (e) {

        console.error("Error clearing localStorage:", e);

    }

}



function updateClearCacheButtonVisibility() {

    const history = getLocalHistory();

    if (history.length > 0) {

        offlineActionsSection.classList.remove("hidden");

    } else {

        offlineActionsSection.classList.add("hidden");

    }

}



function loadOfflineHistory() {

    messagesFeed.innerHTML = "";

    const history = getLocalHistory();

    if (history.length === 0) {

        appendSystemNotification("No local messages. Start typing to chat offline!");

    } else {

        appendSystemNotification("Showing offline messages from local cache.");

        history.forEach(msg => {

            appendMessageBubble(msg.sender, msg.content, msg.time, true);

        });

    }

    scrollToBottom();

}

    </script>

</body>

</html>
